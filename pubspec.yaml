name: safe_send
description: "Safe Send — cross-platform P2P file sharing over WebRTC."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1

  # DI
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Routing
  go_router: ^17.3.0

  # Codegen annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # UI
  lucide_icons_flutter: ^3.1.14
  flutter_svg: ^2.3.0
  toastification: ^3.2.0

  # i18n / utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint
  very_good_analysis: ">=10.0.0 <10.3.0"

  # Codegen
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  injectable_generator: ">=3.0.0 <3.1.0"

  # Splash generator
  flutter_native_splash: ">=2.4.0 <2.4.8"

  # Test
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/brand/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf

# Native launch screen: brand-colored background (instant OS splash).
# A short in-app branded SplashPage (renders the logomark SVG) follows it.
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#070B09"
  android_12:
    color: "#FFFFFF"
    color_dark: "#070B09"
  fullscreen: false
