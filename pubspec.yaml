name: safe_send
description: "Safe Send — cross-platform P2P file sharing over WebRTC."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1

  # DI
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Routing
  go_router: ^17.3.0

  # Codegen annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # UI
  lucide_icons_flutter: ^3.1.14
  flutter_svg: ^2.3.0
  toastification: ^3.2.0

  # i18n / utils
  intl: ^0.20.2

  # P2P transport engine (#002)
  flutter_webrtc: ^1.5.2
  crypto: ^3.0.7
  uuid: ^4.5.3

  # Signaling client (#003)
  web_socket_channel: ^3.0.3
  safesend_signaling:
    path: packages/safesend_signaling

  # Files (#004) — any-type multi-select via the system document picker
  file_picker: ^11.0.2

  # Receive: save / open / share (#005) — app-owned dir, no runtime permission
  path_provider: ^2.1.6

  # History persistence (#006) — drift over SQLite; drift_flutter wraps the
  # connection (native libs + path_provider + background isolate).
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  # Pinned to 12.x: share_plus 13.x needs win32 ^6 which conflicts with
  # file_picker 11's win32 ^5.9 (Windows-only transitive); 12.0.2 has the same
  # SharePlus.instance.share(ShareParams) API and needs no runtime permission.
  share_plus: ^12.0.2
  open_filex: ^4.7.0

  # QR Connect (#007) — render the pairing code as a QR + scan one to pair.
  # qr_flutter: pure-Dart QR render (no native code). mobile_scanner 7.2.0:
  # camera scan + analyzeImage(path) + torch; iOS 12 / Android minSdk 23 (≤ our
  # iOS 13 / API 26 floor). permission_handler: camera status + openAppSettings
  # (first runtime permission). screen_brightness: boost while showing the QR.
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.3
  screen_brightness: ^2.1.11

  # Share Link (#008) — OS deep-link delivery (cold + warm) for safesend:// invite
  # links. Pinned to 6.4.1: app_links 7.1.1+ requires Dart ^3.12 / Flutter >=3.44
  # (this project is Dart 3.11 / Flutter 3.41), so 6.4.1 (sdk ^3.5, flutter
  # >=3.24) is the newest compatible release; its getInitialLink()/uriLinkStream
  # API is identical to 7.x. Share sheet reuses share_plus (above).
  app_links: ^6.4.1

  # Nearby Radar (#009) — mDNS/Bonjour service discovery: advertise + browse +
  # resolve + TXT on iOS (NetService/Bonjour) and Android (NsdManager). nsd 5.0.1
  # targets sdk ^3.11 / flutter >=3.41 (the exact project floor — no pinning),
  # iOS 13 / Android API 21 (≤ our floor), native-backed (no third-party native
  # libs); it acquires the Android MulticastLock internally. Same-network only —
  # no BLE. The 6-digit #003 code rides in the TXT record.
  nsd: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint
  very_good_analysis: ">=10.0.0 <10.3.0"

  # Codegen
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

  # History (#006) drift codegen. Pinned to 2.34.0: 2.34.1 bumped to
  # analyzer ^13 which conflicts with freezed 3.2.5 (analyzer <11). 2.34.0 uses
  # analyzer >=10 <13 — compatible with the existing codegen toolchain.
  drift_dev: ">=2.34.0 <2.34.1"
  injectable_generator: ">=3.0.0 <3.1.0"

  # Splash generator
  flutter_native_splash: ">=2.4.0 <2.4.8"

  # Test
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

  # In-process signaling relay for the #003 integration test (path dep)
  server:
    path: server

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/brand/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf

# Native launch screen: brand-colored background (instant OS splash).
# A short in-app branded SplashPage (renders the logomark SVG) follows it.
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#070B09"
  android_12:
    color: "#FFFFFF"
    color_dark: "#070B09"
  fullscreen: false
