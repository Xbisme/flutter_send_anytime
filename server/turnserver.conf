# Safe Send — coturn TURN relay configuration (#014)
#
# Self-hosted alongside the signaling relay. TURN is the ONLY permitted
# data-relay fallback and ONLY when direct NAT traversal fails; relayed traffic
# stays DTLS-encrypted end-to-end and is NEVER persisted or logged
# (Constitution I). This config carries no media to disk and logs no payloads.
#
# Pair this with the signaling relay env (see bin/server.dart):
#   TURN_URLS=turn:<host>:3478?transport=udp,turns:<host>:5349?transport=tcp
#   TURN_SECRET=<the static-auth-secret below>   # MUST match `static-auth-secret`
#   TURN_TTL_SECONDS=600
# The relay mints base64(HMAC-SHA1(secret, <expiry-unix-ts>)) credentials that
# coturn validates with the same secret. The secret NEVER reaches the client.

# --- listening ---
listening-port=3478
tls-listening-port=5349
# Set to the server's public IP at deploy time.
# external-ip=<PUBLIC_IP>
realm=safesend
server-name=safesend

# --- ephemeral credentials (REST/use-auth-secret) ---
use-auth-secret
# Replace with a long random secret; keep it out of version control + logs.
static-auth-secret=CHANGE_ME_LONG_RANDOM_SECRET

# --- TLS (turns:) ---
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# --- hardening (privacy + abuse) ---
fingerprint
no-cli
no-multicast-peers
# Block relaying to internal/loopback ranges (SSRF/abuse guard).
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
# No verbose logging — never log payloads; error-level only.
no-stdout-log
# stale-nonce + quota keep a single client from exhausting the relay.
stale-nonce=600
total-quota=100
