name: server
description: "Safe Send signaling relay — a lightweight, stateless, self-hostable WebSocket service that introduces two peers and relays SDP/ICE only. Never sees file bytes (#003)."
version: 0.1.0
publish_to: "none"

environment:
  sdk: ^3.11.0

dependencies:
  # #014: HMAC-SHA1 for coturn `use-auth-secret` ephemeral TURN credentials.
  # Matches the app's crypto 3.0.7 (Constitution XV).
  crypto: ^3.0.7
  safesend_signaling:
    path: ../packages/safesend_signaling
  shelf: ^1.4.2
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ">=10.0.0 <10.3.0"
